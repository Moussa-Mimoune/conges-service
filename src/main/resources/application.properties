spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/conges}
spring.datasource.username=${DB_USER:conges}
spring.datasource.password=${DB_PASSWORD:conges}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
management.endpoints.web.exposure.include=health