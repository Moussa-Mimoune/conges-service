name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compiler et tester
        run: mvn -f pom.xml verify

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Construire et pousser l'image Docker
        run: |
          IMAGE=moussamimoune/conges-service:${{ github.sha }}
          docker build -t $IMAGE .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u moussamimoune --password-stdin
          docker push $IMAGE

      - name: Installer oc
        run: |
          curl -L https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz -o oc.tar.gz
          tar xzf oc.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Deployer sur OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_URL }} --token=${{ secrets.OPENSHIFT_TOKEN }}
          oc set image deployment/conges-service conges-service=moussamimoune/conges-service:${{ github.sha }}
          oc rollout status deployment/conges-service